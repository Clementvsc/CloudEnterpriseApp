trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'azure-service-connection' 
  buildConfiguration: 'Release'
  dotNetVersion: '8.x'
  nodeVersion: '20.x'
  appNameDev: 'webapp-dev-2468'
  appNameStaging: 'webapp-staging-2468'
  appNameProd: 'webapp-prod-2468'

stages:
- stage: BuildAndTest
  displayName: 'CI: Build & Test'
  jobs:
  - job: CompileAll
    steps:
    - task: NodeTool@0
      inputs: { versionSpec: '$(nodeVersion)' }

    - script: |
        npm install
        npm run build
      workingDirectory: 'frontend-react'
      displayName: 'Compile React'

    - task: UseDotNet@2
      inputs: { version: '$(dotNetVersion)' }


    - script: dotnet restore CloudEnterpriseApp.Web/CloudEnterpriseApp.Web.csproj
      displayName: 'Restore Backend'

    - script: dotnet build CloudEnterpriseApp.Web/CloudEnterpriseApp.Web.csproj --configuration $(buildConfiguration) --no-restore
      displayName: 'Build Backend'

    - script: |
        mkdir -p CloudEnterpriseApp.Web/wwwroot
        cp -r frontend-react/dist/* CloudEnterpriseApp.Web/wwwroot/
      displayName: 'Merge Frontend'

    - script: dotnet publish CloudEnterpriseApp.Web/CloudEnterpriseApp.Web.csproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)
      displayName: 'Publish'

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'drop'

- stage: DeployDev
  dependsOn: BuildAndTest
  jobs:
  - deployment: Dev
    environment: 'Development'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(appNameDev)'
              package: '$(Pipeline.Workspace)/drop'
- stage: DeployStaging
  dependsOn: DeployDev
  jobs:
  - deployment: Staging
    environment: 'Staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(appNameStaging)'
              package: '$(Pipeline.Workspace)/drop'

- stage: DeployProd
  dependsOn: DeployStaging
  jobs:
  - deployment: Production
    environment: 'Production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(appNameProd)'
              package: '$(Pipeline.Workspace)/drop'
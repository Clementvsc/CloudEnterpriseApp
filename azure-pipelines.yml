trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # UPDATE THIS with your actual Azure Service Connection Name!
  azureSubscription: 'azure-service-connection' 
  buildConfiguration: 'Release'
  dotNetVersion: '8.x'
  nodeVersion: '20.x'
  appNameDev: 'webapp-dev-2468'
  appNameStaging: 'webapp-staging-2468'
  appNameProd: 'webapp-prod-2468'

stages:
# ==========================================
# CI STAGE: Compile & Package
# ==========================================
- stage: BuildAndTest
  displayName: 'CI: Build & Test'
  jobs:
  - job: CompileAll
    displayName: 'Compile React & .NET'
    steps:
    
    # 1. FRONTEND BUILD
    - task: NodeTool@0
      inputs: { versionSpec: '$(nodeVersion)' }

    - script: |
        npm install
        npm run build
      workingDirectory: 'frontend-react'
      displayName: 'Compile React SPA'

    # 2. BACKEND BUILD
    - task: UseDotNet@2
      inputs: { version: '$(dotNetVersion)' }

    - script: dotnet restore CloudEnterpriseApp.Web/CloudEnterpriseApp.Web.csproj
      displayName: 'Restore .NET Packages'

    - script: dotnet build CloudEnterpriseApp.Web/CloudEnterpriseApp.Web.csproj --configuration $(buildConfiguration) --no-restore
      displayName: 'Build .NET API'

    - script: dotnet test CloudEnterpriseApp.Tests/CloudEnterpriseApp.Tests.csproj --configuration $(buildConfiguration) --no-build
      displayName: 'Run Unit Tests'

    # 3. MERGE
    - script: |
        mkdir -p CloudEnterpriseApp.Web/wwwroot
        cp -r frontend-react/dist/* CloudEnterpriseApp.Web/wwwroot/
      displayName: 'Merge Frontend into Backend'

    # 4. PACKAGE
    - script: dotnet publish CloudEnterpriseApp.Web/CloudEnterpriseApp.Web.csproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)
      displayName: 'Publish Unified Artifact'

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'drop'

# ==========================================
# CD STAGES: Deployment
# ==========================================
- stage: DeployDev
  displayName: 'CD: Deploy to DEV'
  dependsOn: BuildAndTest
  jobs:
  - deployment: Dev
    environment: 'Development'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webApp'
              appName: '$(appNameDev)'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'

- stage: DeployStaging
  displayName: 'CD: Deploy to STAGING'
  dependsOn: DeployDev
  jobs:
  - deployment: Staging
    environment: 'Staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webApp'
              appName: '$(appNameStaging)'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'

- stage: DeployProd
  displayName: 'CD: Deploy to PRODUCTION'
  dependsOn: DeployStaging
  jobs:
  - deployment: Production
    environment: 'Production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webApp'
              appName: '$(appNameProd)'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'
trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # UPDATE THIS with your actual Azure Service Connection Name from DevOps!
  azureSubscription: 'Your-Service-Connection-Name' 
  buildConfiguration: 'Release'
  dotNetVersion: '8.x'
  nodeVersion: '20.x'
  appNameDev: 'webapp-dev-2468'
  appNameStaging: 'webapp-staging-2468'
  appNameProd: 'webapp-prod-2468'

stages:
# ==========================================
# CONTINUOUS INTEGRATION (CI) STAGE
# ==========================================
- stage: BuildAndTest
  displayName: 'Full Stack CI Stage'
  jobs:
  - job: CompileAll
    displayName: 'Compile React & .NET'
    steps:
    
    # 1. FRONTEND BUILD
    - task: NodeTool@0
      displayName: 'Provision Node.js $(nodeVersion)'
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: |
        npm install
        npm run build
      displayName: 'Compile React SPA'
      workingDirectory: 'frontend-react'

    # 2. BACKEND BUILD
    - task: UseDotNet@2
      displayName: 'Provision .NET SDK $(dotNetVersion)'
      inputs:
        version: '$(dotNetVersion)'

    - script: dotnet restore CloudEnterpriseApp.slnx
      displayName: 'Restore .NET Packages'

    - script: dotnet build CloudEnterpriseApp.slnx --configuration $(buildConfiguration) --no-restore
      displayName: 'Build .NET Core Solution'

    # 3. THE MERGE: Move React files into .NET before publishing
    - script: |
        mkdir -p CloudEnterpriseApp.Web/wwwroot
        cp -r frontend-react/dist/* CloudEnterpriseApp.Web/wwwroot/
      displayName: 'Merge Frontend into Backend (wwwroot)'

    # 4. PACKAGE EVERYTHING
    - script: dotnet publish CloudEnterpriseApp.Web/CloudEnterpriseApp.Web.csproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)
      displayName: 'Publish Unified Artifact'

    - task: PublishPipelineArtifact@1
      displayName: 'Archive Package for Deployment'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'drop'

# ==========================================
# CONTINUOUS DELIVERY (CD) STAGES
# ==========================================
- stage: DeployDev
  displayName: 'CD Stage: DEV Environment'
  dependsOn: BuildAndTest
  jobs:
  - deployment: Dev
    environment: 'Development'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webApp'
              appName: '$(appNameDev)'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'

- stage: DeployStaging
  displayName: 'CD Stage: STAGING Environment'
  dependsOn: DeployDev
  jobs:
  - deployment: Staging
    environment: 'Staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webApp'
              appName: '$(appNameStaging)'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'

- stage: DeployProd
  displayName: 'CD Stage: PRODUCTION Environment'
  dependsOn: DeployStaging
  jobs:
  - deployment: Production
    environment: 'Production' # Triggers the manual approval UI gate in Azure DevOps
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webApp'
              appName: '$(appNameProd)'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'